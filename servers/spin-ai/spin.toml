#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "spin-ai"
version = "0.1.0"
authors = ["Nuutti Hakala <nuutti.hakala@est.tech>"]
description = "Image recognition with Spin in WASM"

[[trigger.http]]
route = "/..."
component = "spin-ai"

[component.spin-ai]
source = "target/wasm32-wasip1/release/spin_ai.wasm"
allowed_outbound_hosts = []
files = [{ source = "../fixture", destination = "fixture/"}]
[component.spin-ai.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
