#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "spin-rust"
version = "0.1.0"
authors = ["ubuntu"]
description = "HTTP handler with rust"

[[trigger.http]]
route = "/..."
component = "spin-rust"

[component.spin-rust]
source = "target/wasm32-wasip1/release/spin_rust.wasm"
allowed_outbound_hosts = []
[component.spin-rust.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
