apiVersion: apps/v1
kind: Deployment
metadata:
  name: spin-ai-deployment
  labels:
    app: spin-ai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spin-ai-app
  template:
    metadata:
      labels:
        app: spin-ai-app
    spec:
      containers:
      - name: spin
        image: ghcr.io/fermyon/spin:v2.7.0
        args: [
          "up",
          "-k",
          "--listen",
          "0.0.0.0:8080",
          "-f",
          # "10.164.178.1:5000/spin-ai-server:latest"
          "192.168.68.54:5000/spin-ai-server:latest"
        ]
        ports:
        - containerPort: 8080
          name: http-0
        volumeMounts:
        - name: fixture
          mountPath: "fixture"
          readOnly: true
      volumes:
      - name: fixture
        hostPath:
          path: "/home/ubuntu/orch-cost-tools/servers/fixture"
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: spin-ai-server
spec:
  selector:
    app: spin-ai-app
  ports:
    - name: http-0
      port: 80
      protocol: TCP
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spin-ai-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: nuhakala.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spin-ai-server
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spin-ai-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spin-ai-deployment
  minReplicas: 1
  maxReplicas: 100
  metrics:
  - type: External
    external:
      metric:
        name: http_requests_per_second
      target:
        type: Value
        averageValue: 500m
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
---
