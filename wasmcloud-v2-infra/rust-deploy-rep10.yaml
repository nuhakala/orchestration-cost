apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: wash-rust-server
spec:
  replicas: 10
  template:
    spec:
      hostSelector:
        hostgroup: default
      components:
        - name: rust-server
          image: 10.164.178.1:5000/wash-rust-server:0.1.0
          # image: 192.168.68.54:5000/wash-rust-server:0.1.0
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: nuhakala.com
