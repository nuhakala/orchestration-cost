apiVersion: v1
kind: ConfigMap
metadata:
  name: edgemesh-gateway-cfg
  namespace: kubeedge
  labels:
    k8s-app: kubeedge
    kubeedge: edgemesh-gateway
data:
  edgemesh-gateway.yaml: |
    # For more detailed configuration, please refer to: https://edgemesh.netlify.app/reference/config-items.html#edgemesh-gateway-cfg
    modules:
      edgeGateway:
        enable: true
      edgeTunnel:
        enable: true
        relayNodes:
        - nodeName: cloud
          advertiseAddress: ["10.164.178.211"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edgemesh-gateway-psk
  namespace: kubeedge
  labels:
    k8s-app: kubeedge
    kubeedge: edgemesh-gateway
