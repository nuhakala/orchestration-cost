apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
  labels:
    app: ai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-app
  template:
    metadata:
      labels:
        app: ai-app
    spec:
      containers:
      # - image: 10.164.178.1:5000/rust-server-ai
      - image: 192.168.68.54:5000/rust-server-ai
        name: ai-server
        ports:
        - containerPort: 8080
      nodeSelector:
        # node-role.kubernetes.io/control-plane: ""
        node-role.kubernetes.io/edge: ""
---
apiVersion: v1
kind: Service
metadata:
  name: ai-server
spec:
  selector:
    app: ai-app
  ports:
    - name: http-0
      port: 12345
      protocol: TCP
      targetPort: 8080
---
apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: ai-vs
  namespace: default
spec:
  host: "nuhakala.com"
  upstreams:
  - name: ai-server
    service: ai-server
    port: 12345
    use-cluster-ip: true
  routes:
  - path: /
    action:
      proxy:
        upstream: ai-server
        requestHeaders:
          set:
          - name: Host
            value: ai-server.nginx-ingress.svc.cluster.local
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: ai-rule
spec:
  host: ai-server
  trafficPolicy:
    loadBalancer:
      simple: RANDOM
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-deploy-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-deployment
  minReplicas: 1
  maxReplicas: 100
  metrics:
  - type: External
    external:
      metric:
        name: http_requests_per_second
      target:
        type: Value
        averageValue: 500m
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
---
