---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: ai-server
  name: ai-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-server
    spec:
      containers:
      # - image: 10.164.178.1:5000/rust-server-ai
      - image: 192.168.68.54:5000/rust-server-ai
        name: ai-server
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector:
    app.kubernetes.io/name: ai-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: nuhakala.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-deploy-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-server
  minReplicas: 1
  maxReplicas: 100
  metrics:
  - type: External
    external:
      metric:
        name: http_requests_per_second
      target:
        type: Value
        averageValue: 500m
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
---
